<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate JS - Tipos de Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Explorador de Tipos de Datos en JS</h1>
        <p>Interactúa con los botones para ver cómo JavaScript maneja la información.</p>
        
        <div class="btn-group">
            <button id="btn-string">String</button>
            <button id="btn-number">Number</button>
            <button id="btn-boolean">Boolean</button>
            <button id="btn-array">Array</button>
            <button id="btn-object">Object</button>
        </div>

        <div id="display-area">Elige un tipo de dato arriba...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
