<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate JS - Tipos de Datos</title>
    <style>
        /* Estilos generales para que se vea moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f8f8f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        /* Diseño de los botones */
        .btn-group {
            margin: 30px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background-color: #6272a4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #ff79c6;
            transform: scale(1.1);
        }

        /* Área donde mostraremos los datos */
        #display-area {
            margin-top: 20px;
            padding: 30px;
            border: 2px dashed #44475a;
            border-radius: 12px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background-color: #282a36;
        }

        pre { text-align: left; margin: 0; font-size: 1.2rem; color: #f1fa8c; }

        /* --- CLASES DE EFECTOS VISTOSOS (Controladas por JS) --- */
        .pop-effect {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #50fa7b;
            text-shadow: 0 0 10px rgba(80, 250, 123, 0.5);
        }

        .spin-effect {
            animation: spin 0.6s ease-in-out;
            color: #8be9fd;
        }

        .slide-effect {
            animation: slideIn 0.5s ease-out;
            color: #ffb86c;
        }

        /* Animaciones clave */
        @keyframes pop {
            0% { transform: scale(0.1); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }
        @keyframes slideIn {
            0% { transform: translateX(-50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Explorador de Tipos de Datos en JS</h1>
        <p>Interactúa con los botones para ver cómo JavaScript maneja la información.</p>
        
        <div class="btn-group">
            <button id="btn-string">String</button>
            <button id="btn-number">Number</button>
            <button id="btn-boolean">Boolean</button>
            <button id="btn-array">Array</button>
            <button id="btn-object">Object</button>
        </div>

        <div id="display-area">Elige un tipo de dato arriba...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
